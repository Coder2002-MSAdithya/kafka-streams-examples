# Schema Registry for the microservices SASL broker (Confluent 8.x).
# Start with: config/security/start-schema-registry.sh

listeners=http://0.0.0.0:8081
kafkastore.topic=_schemas
kafkastore.topic.replication.factor=3

kafkastore.bootstrap.servers=SASL_PLAINTEXT://localhost:9092,SASL_PLAINTEXT://localhost:9094,SASL_PLAINTEXT://localhost:9096
kafkastore.security.protocol=SASL_PLAINTEXT
kafkastore.sasl.mechanism=SCRAM-SHA-256
kafkastore.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="admin" \
  password="admin-secret";
