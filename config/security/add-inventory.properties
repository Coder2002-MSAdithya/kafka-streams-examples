security.protocol=SASL_PLAINTEXT
sasl.mechanism=SCRAM-SHA-256
sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="inventory-svc" \
  password="inventory-secret";

# Kafka authentication principal for this producer tool (SASL/SCRAM), not DIFC registration.
producer.security.protocol=SASL_PLAINTEXT
producer.sasl.mechanism=SCRAM-SHA-256
producer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="inventory-svc" password="inventory-secret";
