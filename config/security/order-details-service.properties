security.protocol=SASL_PLAINTEXT
sasl.mechanism=SCRAM-SHA-256
sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="order-details-svc" \
  password="order-details-secret";

# Kafka authentication principal for this service (SASL/SCRAM), not DIFC registration.
# Kafka Streams creates consumer, producer, and admin clients; keep all of them on order-details-svc.
consumer.security.protocol=SASL_PLAINTEXT
consumer.sasl.mechanism=SCRAM-SHA-256
consumer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="order-details-svc" password="order-details-secret";

producer.security.protocol=SASL_PLAINTEXT
producer.sasl.mechanism=SCRAM-SHA-256
producer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="order-details-svc" password="order-details-secret";

admin.security.protocol=SASL_PLAINTEXT
admin.sasl.mechanism=SCRAM-SHA-256
admin.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="order-details-svc" password="order-details-secret";

__state.updater.enabled__=false
