# Schema Registry (also passed via -s on start-orders-service.sh)
schema.registry.url=http://localhost:8081

security.protocol=SASL_PLAINTEXT
sasl.mechanism=SCRAM-SHA-256
sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="orders-svc" \
  password="orders-secret";

# Kafka authentication principal for this service (SASL/SCRAM), not DIFC registration.
# OrdersService has a Streams app for the query store and a producer for HTTP POSTs.
consumer.security.protocol=SASL_PLAINTEXT
consumer.sasl.mechanism=SCRAM-SHA-256
consumer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="orders-svc" password="orders-secret";

producer.security.protocol=SASL_PLAINTEXT
producer.sasl.mechanism=SCRAM-SHA-256
producer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="orders-svc" password="orders-secret";

admin.security.protocol=SASL_PLAINTEXT
admin.sasl.mechanism=SCRAM-SHA-256
admin.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="orders-svc" password="orders-secret";

__state.updater.enabled__=false

# Producer (OrdersService REST POST) - fail faster with a clear error if brokers are unreachable
request.timeout.ms=30000
delivery.timeout.ms=120000
max.block.ms=60000
